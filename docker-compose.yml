version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: jurisai-db
    environment:
      POSTGRES_USER: jurisai
      POSTGRES_PASSWORD: jurisai_secret
      POSTGRES_DB: jurisai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jurisai -d jurisai"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
